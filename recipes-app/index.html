<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Recipe Book</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf9f7;
      --surface: #ffffff;
      --border: #e8e4de;
      --text: #2c2825;
      --text-muted: #8c8078;
      --accent: #c0703a;
      --accent-light: #f5ede5;
      --accent-hover: #a85e2e;
      --danger: #c0393a;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    body {
      font-family: 'Georgia', serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo { font-size: 1.5rem; font-weight: bold; color: var(--accent); letter-spacing: -0.5px; }
    .logo span { color: var(--text); }

    .header-controls { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }

    input[type="search"] {
      font-family: inherit;
      font-size: 0.9rem;
      padding: 0.5rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      width: 220px;
      outline: none;
    }
    input[type="search"]:focus { border-color: var(--accent); }

    select {
      font-family: inherit;
      font-size: 0.9rem;
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      outline: none;
    }
    select:focus { border-color: var(--accent); }

    /* ── Buttons ── */
    .btn {
      font-family: inherit;
      font-size: 0.9rem;
      padding: 0.5rem 1.1rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-ghost { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
    .btn-ghost:hover { background: var(--accent-light); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { opacity: 0.85; }
    .btn-sm { font-size: 0.8rem; padding: 0.35rem 0.75rem; }

    /* ── Main ── */
    main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

    .empty-state {
      text-align: center;
      padding: 5rem 2rem;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 3.5rem; margin-bottom: 1rem; }
    .empty-state h2 { font-size: 1.3rem; margin-bottom: 0.5rem; color: var(--text); }

    /* ── Cards ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      overflow: hidden;
    }
    .card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.12); }

    .card-body { padding: 1.25rem; flex: 1; }
    .card-category {
      display: inline-block;
      font-size: 0.72rem;
      font-family: sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding: 0.2rem 0.6rem;
      border-radius: 99px;
      background: var(--accent-light);
      color: var(--accent);
      margin-bottom: 0.65rem;
    }
    .card-title { font-size: 1.1rem; font-weight: bold; margin-bottom: 0.4rem; line-height: 1.3; }
    .card-desc {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      padding: 0.75rem 1.25rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 1rem;
      font-size: 0.78rem;
      color: var(--text-muted);
      font-family: sans-serif;
    }
    .card-meta { display: flex; gap: 0.25rem; align-items: center; }

    /* ── Modal ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-y: auto;
    }
    .overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border-radius: var(--radius);
      width: 100%;
      max-width: 680px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      margin: auto;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .modal-header h2 { font-size: 1.2rem; }

    .close-btn {
      font-size: 1.4rem;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      line-height: 1;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
    }
    .close-btn:hover { background: var(--border); }

    /* ── Forms ── */
    .modal-body { padding: 1.5rem; }

    .field { margin-bottom: 1.1rem; }
    label { display: block; font-size: 0.85rem; font-family: sans-serif; font-weight: 600; margin-bottom: 0.35rem; color: var(--text); }

    input[type="text"],
    input[type="number"],
    textarea,
    select.form-select {
      font-family: inherit;
      font-size: 0.95rem;
      width: 100%;
      padding: 0.55rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      outline: none;
    }
    input[type="text"]:focus,
    input[type="number"]:focus,
    textarea:focus,
    select.form-select:focus { border-color: var(--accent); }

    textarea { resize: vertical; min-height: 80px; }

    .row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.75rem; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

    /* Dynamic list inputs */
    .list-editor { display: flex; flex-direction: column; gap: 0.5rem; }
    .list-item { display: flex; gap: 0.5rem; align-items: center; }
    .list-item input { flex: 1; }
    .remove-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 1.1rem;
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .remove-btn:hover { color: var(--danger); background: #fdeaea; }

    .add-item-btn {
      font-family: sans-serif;
      font-size: 0.82rem;
      color: var(--accent);
      background: none;
      border: 1px dashed var(--accent);
      border-radius: 8px;
      padding: 0.4rem 0.75rem;
      cursor: pointer;
      width: 100%;
      text-align: left;
      margin-top: 0.25rem;
    }
    .add-item-btn:hover { background: var(--accent-light); }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
    }

    /* ── Detail view ── */
    .detail-overlay { align-items: flex-start; }
    .detail-modal { max-width: 720px; }

    .detail-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .detail-category { display: inline-block; font-size: 0.72rem; font-family: sans-serif; text-transform: uppercase; letter-spacing: 0.07em; padding: 0.2rem 0.6rem; border-radius: 99px; background: var(--accent-light); color: var(--accent); margin-bottom: 0.5rem; }
    .detail-title { font-size: 1.6rem; margin-bottom: 0.5rem; line-height: 1.2; }
    .detail-desc { color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; margin-bottom: 0.75rem; }
    .detail-meta { display: flex; gap: 1.5rem; font-size: 0.82rem; color: var(--text-muted); font-family: sans-serif; flex-wrap: wrap; }
    .detail-meta span b { color: var(--text); }

    .detail-body { padding: 1.5rem; display: grid; grid-template-columns: 1fr 1.6fr; gap: 2rem; }
    @media (max-width: 560px) { .detail-body { grid-template-columns: 1fr; } .row { grid-template-columns: 1fr; } }

    .section-title { font-size: 1rem; font-family: sans-serif; font-weight: 700; margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--accent); }

    .ingredient-list { list-style: none; }
    .ingredient-list li {
      padding: 0.45rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.93rem;
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
    }
    .ingredient-list li::before { content: '·'; color: var(--accent); font-size: 1.2rem; flex-shrink: 0; }

    .instruction-list { list-style: none; counter-reset: step; }
    .instruction-list li {
      counter-increment: step;
      display: flex;
      gap: 0.9rem;
      margin-bottom: 0.9rem;
      font-size: 0.93rem;
      line-height: 1.6;
    }
    .instruction-list li::before {
      content: counter(step);
      background: var(--accent);
      color: #fff;
      width: 1.5rem;
      height: 1.5rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-family: sans-serif;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 0.1rem;
    }

    .detail-actions { display: flex; gap: 0.5rem; }
  </style>
</head>
<body>

<header>
  <div class="logo">&#127859; <span>My Recipe Book</span></div>
  <div class="header-controls">
    <input type="search" id="search" placeholder="Search recipes…" />
    <select id="category-filter">
      <option value="all">All categories</option>
      <option>Breakfast</option>
      <option>Lunch</option>
      <option>Dinner</option>
      <option>Dessert</option>
      <option>Snack</option>
      <option>Drink</option>
      <option>Other</option>
    </select>
    <button class="btn btn-primary" onclick="openForm()">+ Add Recipe</button>
  </div>
</header>

<main id="main">
  <div class="empty-state" id="empty">
    <div class="icon">&#127859;</div>
    <h2>No recipes yet</h2>
    <p>Click "Add Recipe" to get started!</p>
  </div>
  <div class="grid" id="grid"></div>
</main>

<!-- Add/Edit Form Modal -->
<div class="overlay" id="form-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="form-title">New Recipe</h2>
      <button class="close-btn" onclick="closeForm()">&#215;</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label for="f-title">Title *</label>
        <input type="text" id="f-title" placeholder="e.g. Classic Carbonara" />
      </div>
      <div class="field">
        <label for="f-desc">Description</label>
        <textarea id="f-desc" rows="2" placeholder="A short description…"></textarea>
      </div>
      <div class="row">
        <div class="field">
          <label for="f-category">Category</label>
          <select class="form-select" id="f-category">
            <option>Breakfast</option>
            <option>Lunch</option>
            <option>Dinner</option>
            <option>Dessert</option>
            <option>Snack</option>
            <option>Drink</option>
            <option>Other</option>
          </select>
        </div>
        <div class="field">
          <label for="f-servings">Servings</label>
          <input type="number" id="f-servings" value="2" min="1" />
        </div>
        <div class="field">
          <label>&nbsp;</label>
          <div class="row2">
            <div>
              <label for="f-prep" style="margin-bottom:0.2rem">Prep (min)</label>
              <input type="number" id="f-prep" value="0" min="0" />
            </div>
            <div>
              <label for="f-cook" style="margin-bottom:0.2rem">Cook (min)</label>
              <input type="number" id="f-cook" value="0" min="0" />
            </div>
          </div>
        </div>
      </div>

      <div class="field">
        <label>Ingredients</label>
        <div class="list-editor" id="ingredients-editor"></div>
        <button class="add-item-btn" onclick="addIngredient()">+ Add ingredient</button>
      </div>

      <div class="field">
        <label>Instructions</label>
        <div class="list-editor" id="instructions-editor"></div>
        <button class="add-item-btn" onclick="addInstruction()">+ Add step</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeForm()">Cancel</button>
      <button class="btn btn-primary" id="save-btn" onclick="saveRecipe()">Save Recipe</button>
    </div>
  </div>
</div>

<!-- Detail View Modal -->
<div class="overlay detail-overlay" id="detail-overlay">
  <div class="modal detail-modal">
    <div class="modal-header">
      <div class="detail-actions">
        <button class="btn btn-ghost btn-sm" id="edit-btn">Edit</button>
        <button class="btn btn-danger btn-sm" id="delete-btn">Delete</button>
      </div>
      <button class="close-btn" onclick="closeDetail()">&#215;</button>
    </div>
    <div class="detail-header" id="detail-header"></div>
    <div class="detail-body" id="detail-body"></div>
  </div>
</div>

<script>
  let recipes = [];
  let editingId = null;
  let viewingId = null;

  const CATEGORIES = ['Breakfast','Lunch','Dinner','Dessert','Snack','Drink','Other'];

  async function fetchRecipes() {
    const q = document.getElementById('search').value;
    const category = document.getElementById('category-filter').value;
    const params = new URLSearchParams();
    if (q) params.set('q', q);
    if (category !== 'all') params.set('category', category);
    const res = await fetch('/api/recipes?' + params);
    recipes = await res.json();
    renderGrid();
  }

  function fmtTime(min) {
    if (!min) return '—';
    if (min < 60) return min + ' min';
    return Math.floor(min/60) + 'h ' + (min%60 ? (min%60)+'m' : '');
  }

  function renderGrid() {
    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');
    if (!recipes.length) {
      grid.innerHTML = '';
      empty.style.display = '';
      return;
    }
    empty.style.display = 'none';
    grid.innerHTML = recipes.map(r => `
      <div class="card" onclick="openDetail('${r.id}')">
        <div class="card-body">
          <span class="card-category">${r.category}</span>
          <div class="card-title">${esc(r.title)}</div>
          ${r.description ? `<div class="card-desc">${esc(r.description)}</div>` : ''}
        </div>
        <div class="card-footer">
          <span class="card-meta">&#128101; ${r.servings} serving${r.servings!=1?'s':''}</span>
          <span class="card-meta">&#9201; ${fmtTime((r.prepTime||0)+(r.cookTime||0))}</span>
          <span class="card-meta">&#127860; ${r.ingredients.length} ingredient${r.ingredients.length!=1?'s':''}</span>
        </div>
      </div>
    `).join('');
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── Form ── */
  function openForm(id) {
    editingId = id || null;
    document.getElementById('form-title').textContent = id ? 'Edit Recipe' : 'New Recipe';
    const r = id ? recipes.find(x => x.id === id) : null;
    document.getElementById('f-title').value = r ? r.title : '';
    document.getElementById('f-desc').value = r ? r.description : '';
    document.getElementById('f-category').value = r ? r.category : 'Dinner';
    document.getElementById('f-servings').value = r ? r.servings : 2;
    document.getElementById('f-prep').value = r ? r.prepTime : 0;
    document.getElementById('f-cook').value = r ? r.cookTime : 0;

    const ingEd = document.getElementById('ingredients-editor');
    ingEd.innerHTML = '';
    const ings = r ? r.ingredients : [''];
    ings.forEach(v => addIngredient(v));
    if (!r) addIngredient();

    const insEd = document.getElementById('instructions-editor');
    insEd.innerHTML = '';
    const inss = r ? r.instructions : [];
    inss.forEach(v => addInstruction(v));
    if (!r) addInstruction();

    document.getElementById('form-overlay').classList.add('open');
    document.getElementById('f-title').focus();
  }

  function closeForm() {
    document.getElementById('form-overlay').classList.remove('open');
  }

  function makeListItem(editorId, placeholder, value) {
    const div = document.createElement('div');
    div.className = 'list-item';
    div.innerHTML = `
      <input type="text" placeholder="${placeholder}" value="${esc(value||'')}" />
      <button class="remove-btn" title="Remove" onclick="this.parentElement.remove()">&#215;</button>
    `;
    document.getElementById(editorId).appendChild(div);
  }

  function addIngredient(v) { makeListItem('ingredients-editor', 'e.g. 2 cups flour', v||''); }
  function addInstruction(v) { makeListItem('instructions-editor', 'Describe this step…', v||''); }

  function getListValues(editorId) {
    return [...document.querySelectorAll(`#${editorId} input`)]
      .map(i => i.value.trim()).filter(Boolean);
  }

  async function saveRecipe() {
    const title = document.getElementById('f-title').value.trim();
    if (!title) { document.getElementById('f-title').focus(); return; }

    const body = {
      title,
      description: document.getElementById('f-desc').value.trim(),
      category: document.getElementById('f-category').value,
      servings: parseInt(document.getElementById('f-servings').value) || 1,
      prepTime: parseInt(document.getElementById('f-prep').value) || 0,
      cookTime: parseInt(document.getElementById('f-cook').value) || 0,
      ingredients: getListValues('ingredients-editor'),
      instructions: getListValues('instructions-editor'),
    };

    const btn = document.getElementById('save-btn');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    try {
      if (editingId) {
        await fetch(`/api/recipes/${editingId}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
      } else {
        await fetch('/api/recipes', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
      }
      closeForm();
      await fetchRecipes();
    } finally {
      btn.disabled = false;
      btn.textContent = 'Save Recipe';
    }
  }

  /* ── Detail ── */
  async function openDetail(id) {
    viewingId = id;
    const r = recipes.find(x => x.id === id);
    if (!r) return;

    document.getElementById('detail-header').innerHTML = `
      <span class="detail-category">${esc(r.category)}</span>
      <div class="detail-title">${esc(r.title)}</div>
      ${r.description ? `<div class="detail-desc">${esc(r.description)}</div>` : ''}
      <div class="detail-meta">
        <span>&#128101; <b>${r.servings}</b> serving${r.servings!=1?'s':''}</span>
        <span>&#9202; Prep: <b>${fmtTime(r.prepTime)}</b></span>
        <span>&#9201; Cook: <b>${fmtTime(r.cookTime)}</b></span>
        ${(r.prepTime||0)+(r.cookTime||0) ? `<span>&#8987; Total: <b>${fmtTime((r.prepTime||0)+(r.cookTime||0))}</b></span>` : ''}
      </div>
    `;

    document.getElementById('detail-body').innerHTML = `
      <div>
        <div class="section-title">Ingredients</div>
        ${r.ingredients.length
          ? `<ul class="ingredient-list">${r.ingredients.map(i=>`<li>${esc(i)}</li>`).join('')}</ul>`
          : '<p style="color:var(--text-muted);font-size:.9rem">No ingredients listed.</p>'}
      </div>
      <div>
        <div class="section-title">Instructions</div>
        ${r.instructions.length
          ? `<ol class="instruction-list">${r.instructions.map(s=>`<li>${esc(s)}</li>`).join('')}</ol>`
          : '<p style="color:var(--text-muted);font-size:.9rem">No instructions listed.</p>'}
      </div>
    `;

    document.getElementById('edit-btn').onclick = () => { closeDetail(); openForm(id); };
    document.getElementById('delete-btn').onclick = () => deleteRecipe(id);

    document.getElementById('detail-overlay').classList.add('open');
  }

  function closeDetail() {
    document.getElementById('detail-overlay').classList.remove('open');
  }

  async function deleteRecipe(id) {
    if (!confirm('Delete this recipe? This cannot be undone.')) return;
    await fetch(`/api/recipes/${id}`, { method: 'DELETE' });
    closeDetail();
    await fetchRecipes();
  }

  /* ── Init ── */
  document.getElementById('search').addEventListener('input', debounce(fetchRecipes, 300));
  document.getElementById('category-filter').addEventListener('change', fetchRecipes);

  document.getElementById('form-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeForm(); });
  document.getElementById('detail-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeDetail(); });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeForm(); closeDetail(); }
  });

  function debounce(fn, ms) {
    let t;
    return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
  }

  fetchRecipes();
</script>
</body>
</html>
